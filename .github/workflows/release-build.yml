name: Release Build

on:
  push:
    tags: ['v*.*.*']
  pull_request:
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - ios
          - macos
          - windows
      ios_distribution:
        description: 'iOS distribution method'
        required: true
        default: 'ad-hoc'
        type: choice
        options:
          - ad-hoc
          - app-store-connect
      upload_testflight:
        description: 'Upload iOS IPA to App Store Connect for TestFlight'
        required: true
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  BUNDLE_ID: jp.ohnaka.MimicX

jobs:
  prepare:
    name: Prepare version
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      build_number: ${{ steps.version.outputs.build_number }}
      flutter_version: ${{ steps.version.outputs.flutter_version }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine versions
        id: version
        shell: bash
        run: |
          set -euo pipefail

          APP_VERSION=$(grep -E '^version:' pubspec.yaml | sed -E 's/version:[[:space:]]*([^+]+).*/\1/')
          FLUTTER_VERSION=$(sed -nE 's/.*"flutter"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' .fvmrc)

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            echo "git tag       : ${GITHUB_REF#refs/tags/}"
            echo "tag version   : ${TAG_VERSION}"
            echo "pubspec       : ${APP_VERSION}"
            if [ "${TAG_VERSION}" != "${APP_VERSION}" ]; then
              echo "::error::pubspec.yaml version (${APP_VERSION}) does not match tag (${TAG_VERSION})"
              exit 1
            fi
            echo "is_release=true" >> "${GITHUB_OUTPUT}"
          else
            echo "pubspec       : ${APP_VERSION} (manual build)"
            echo "is_release=false" >> "${GITHUB_OUTPUT}"
          fi

          echo "app_version=${APP_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "build_number=${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"
          echo "flutter_version=${FLUTTER_VERSION}" >> "${GITHUB_OUTPUT}"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: write
    steps:
      - name: Checkout
        if: needs.prepare.outputs.is_release == 'true'
        uses: actions/checkout@v6

      - name: Create GitHub Release
        if: needs.prepare.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              --verify-tag
          fi

      - name: Skip release creation
        if: needs.prepare.outputs.is_release != 'true'
        run: echo "Release creation is skipped for non-tag builds."

  android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [prepare, release]
    if: github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android'
    permissions:
      contents: write
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ needs.prepare.outputs.flutter_version }}
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties', 'pubspec.lock') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Install Android signing key
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        shell: bash
        run: |
          set -euo pipefail
          for name in ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::GitHub Secret ${name} is required when ANDROID_KEYSTORE_BASE64 is set"
              exit 1
            fi
          done

          KEYSTORE_PATH="${RUNNER_TEMP}/mimicx-release.keystore"
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${KEYSTORE_PATH}"
          echo "ANDROID_KEYSTORE_PATH=${KEYSTORE_PATH}" >> "${GITHUB_ENV}"

      - name: Build Android App Bundle
        run: >
          flutter build appbundle --release
          --build-name=${{ needs.prepare.outputs.app_version }}
          --build-number=${{ needs.prepare.outputs.build_number }}

      - name: Build universal APK
        run: >
          flutter build apk --release
          --build-name=${{ needs.prepare.outputs.app_version }}
          --build-number=${{ needs.prepare.outputs.build_number }}

      - name: Package Android artifacts
        id: package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          AAB="dist/MimicX_android-${{ needs.prepare.outputs.app_version }}.aab"
          APK="dist/MimicX_android-${{ needs.prepare.outputs.app_version }}.apk"
          cp build/app/outputs/bundle/release/app-release.aab "${AAB}"
          cp build/app/outputs/flutter-apk/app-release.apk "${APK}"
          echo "aab=${AAB}" >> "${GITHUB_OUTPUT}"
          echo "apk=${APK}" >> "${GITHUB_OUTPUT}"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mimicx-android-${{ needs.prepare.outputs.app_version }}-${{ needs.prepare.outputs.build_number }}
          path: dist/*
          retention-days: 14

      - name: Upload Android artifacts to GitHub Release
        if: needs.prepare.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "${{ steps.package.outputs.apk }}" --clobber

  ios:
    name: Build iOS
    runs-on: macos-26
    needs: prepare
    if: github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios'
    permissions:
      contents: read
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      IOS_APP_STORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_APP_STORE_PROVISIONING_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      IOS_DISTRIBUTION_METHOD: ${{ github.event_name == 'push' && 'app-store-connect' || github.event.inputs.ios_distribution || 'ad-hoc' }}
      UPLOAD_TESTFLIGHT: ${{ github.event_name == 'push' && 'true' || github.event.inputs.upload_testflight || 'false' }}
      APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
      APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
      APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ needs.prepare.outputs.flutter_version }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Install iOS signing assets
        shell: bash
        run: |
          set -euo pipefail

          for name in APPLE_TEAM_ID IOS_CERTIFICATE_BASE64 IOS_CERTIFICATE_PASSWORD KEYCHAIN_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::GitHub Secret ${name} is required for iOS archive export"
              exit 1
            fi
          done

          if [ "${IOS_DISTRIBUTION_METHOD}" = "app-store-connect" ]; then
            if [ -z "${IOS_APP_STORE_PROVISIONING_PROFILE_BASE64:-}" ]; then
              echo "::error::GitHub Secret IOS_APP_STORE_PROVISIONING_PROFILE_BASE64 is required for App Store Connect export"
              exit 1
            fi
            PROFILE_BASE64="${IOS_APP_STORE_PROVISIONING_PROFILE_BASE64}"
            EXPORT_METHOD="app-store-connect"
          else
            if [ -z "${IOS_PROVISIONING_PROFILE_BASE64:-}" ]; then
              echo "::error::GitHub Secret IOS_PROVISIONING_PROFILE_BASE64 is required for Ad Hoc export"
              exit 1
            fi
            PROFILE_BASE64="${IOS_PROVISIONING_PROFILE_BASE64}"
            EXPORT_METHOD="ad-hoc"
          fi

          if [ "${UPLOAD_TESTFLIGHT}" = "true" ]; then
            if [ "${IOS_DISTRIBUTION_METHOD}" != "app-store-connect" ]; then
              echo "::error::upload_testflight=true requires ios_distribution=app-store-connect"
              exit 1
            fi
            for name in APPSTORE_ISSUER_ID APPSTORE_KEY_ID APPSTORE_PRIVATE_KEY; do
              if [ -z "${!name:-}" ]; then
                echo "::error::GitHub Secret ${name} is required to upload to App Store Connect"
                exit 1
              fi
            done
          fi

          CERTIFICATE_PATH="${RUNNER_TEMP}/ios-signing.p12"
          PP_PATH="${RUNNER_TEMP}/ios-profile.mobileprovision"
          KEYCHAIN_PATH="${RUNNER_TEMP}/ios-signing.keychain-db"
          mkdir -p "${HOME}/Library/MobileDevice/Provisioning Profiles"

          echo "${IOS_CERTIFICATE_BASE64}" | base64 --decode > "${CERTIFICATE_PATH}"
          echo "${PROFILE_BASE64}" | base64 --decode > "${PP_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" -P "${IOS_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security list-keychain -d user -s "${KEYCHAIN_PATH}" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "${PP_PATH}")")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' /dev/stdin <<< "$(security cms -D -i "${PP_PATH}")")
          cp "${PP_PATH}" "${HOME}/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"

          {
            echo "IOS_PROFILE_UUID=${PROFILE_UUID}"
            echo "IOS_PROFILE_NAME=${PROFILE_NAME}"
            echo "IOS_EXPORT_METHOD=${EXPORT_METHOD}"
          } >> "${GITHUB_ENV}"

      - name: Generate ExportOptions.plist
        shell: bash
        run: |
          set -euo pipefail
          cat > "${RUNNER_TEMP}/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${IOS_EXPORT_METHOD}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${IOS_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          PLIST

      - name: Build iOS archive
        run: >
          flutter build ios --release --config-only
          --build-name=${{ needs.prepare.outputs.app_version }}
          --build-number=${{ needs.prepare.outputs.build_number }}

      - name: Archive iOS app
        run: >
          xcodebuild archive
          -workspace ios/Runner.xcworkspace
          -scheme Runner
          -configuration Release
          -sdk iphoneos
          -archivePath build/ios/archive/Runner.xcarchive
          DEVELOPMENT_TEAM="${APPLE_TEAM_ID}"
          CODE_SIGN_STYLE=Manual
          PROVISIONING_PROFILE_SPECIFIER="${IOS_PROFILE_NAME}"
          CODE_SIGN_IDENTITY="Apple Distribution"

      - name: Export iOS IPA
        run: >
          xcodebuild -exportArchive
          -archivePath build/ios/archive/Runner.xcarchive
          -exportPath build/ios/ipa
          -exportOptionsPlist "${RUNNER_TEMP}/ExportOptions.plist"

      - name: Package iOS artifacts
        id: package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          IPA=$(find build/ios/ipa -name '*.ipa' -type f | head -n 1)
          cp "${IPA}" "dist/MimicX_ios-${{ needs.prepare.outputs.app_version }}.ipa"
          ditto -c -k --sequesterRsrc --keepParent build/ios/archive/Runner.xcarchive "dist/MimicX_ios-${{ needs.prepare.outputs.app_version }}.xcarchive.zip"

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mimicx-ios-${{ needs.prepare.outputs.app_version }}-${{ needs.prepare.outputs.build_number }}
          path: dist/*
          retention-days: 14

      - name: Upload iOS IPA to App Store Connect
        if: env.UPLOAD_TESTFLIGHT == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.appstoreconnect/private_keys"
          KEY_PATH="${HOME}/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8"

          if [[ "${APPSTORE_PRIVATE_KEY}" == *"BEGIN PRIVATE KEY"* ]]; then
            printf '%s' "${APPSTORE_PRIVATE_KEY}" | perl -pe 's/\\n/\n/g; s/\r$//' > "${KEY_PATH}"
          else
            printf '%s' "${APPSTORE_PRIVATE_KEY}" | base64 --decode > "${KEY_PATH}"
          fi

          if ! grep -q "BEGIN PRIVATE KEY" "${KEY_PATH}"; then
            echo "::error::APPSTORE_PRIVATE_KEY must be the contents of the App Store Connect API key .p8 file, or its base64-encoded value"
            exit 1
          fi

          chmod 600 "${KEY_PATH}"

          IPA=$(find build/ios/ipa -name '*.ipa' -type f | head -n 1)
          xcrun altool --upload-app \
            -f "${IPA}" \
            -t ios \
            --apiKey "${APPSTORE_KEY_ID}" \
            --apiIssuer "${APPSTORE_ISSUER_ID}"

  macos:
    name: Build macOS
    runs-on: macos-15
    needs: [prepare, release]
    if: github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos'
    permissions:
      contents: write
    env:
      MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
      APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
      APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ needs.prepare.outputs.flutter_version }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Install macOS signing certificate
        shell: bash
        run: |
          set -euo pipefail

          for name in MACOS_CERTIFICATE_BASE64 MACOS_CERTIFICATE_PASSWORD KEYCHAIN_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::GitHub Secret ${name} is required for macOS Developer ID signing and notarization"
              exit 1
            fi
          done

          CERTIFICATE_PATH="${RUNNER_TEMP}/macos-signing.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/macos-signing.keychain-db"
          echo "${MACOS_CERTIFICATE_BASE64}" | base64 --decode > "${CERTIFICATE_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" -P "${MACOS_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security list-keychain -d user -s "${KEYCHAIN_PATH}" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          SIGN_IDENTITY=$(security find-identity -v -p codesigning "${KEYCHAIN_PATH}" | sed -n 's/.*"\(Developer ID Application:.*\)".*/\1/p' | head -n 1)
          if [ -z "${SIGN_IDENTITY}" ]; then
            echo "::error::MACOS_CERTIFICATE_BASE64 must contain a Developer ID Application certificate"
            exit 1
          fi

          echo "MACOS_KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"
          echo "MACOS_SIGN_IDENTITY=${SIGN_IDENTITY}" >> "${GITHUB_ENV}"

      - name: Build macOS release
        run: >
          flutter build macos --release
          --build-name=${{ needs.prepare.outputs.app_version }}
          --build-number=${{ needs.prepare.outputs.build_number }}

      - name: Sign and notarize macOS app
        shell: bash
        run: |
          set -euo pipefail

          for name in APPSTORE_ISSUER_ID APPSTORE_KEY_ID APPSTORE_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::GitHub Secret ${name} is required for macOS notarization"
              exit 1
            fi
          done

          APP_PATH="build/macos/Build/Products/Release/Mimic X.app"
          NOTARY_ZIP="${RUNNER_TEMP}/MimicX_macos-notary.zip"
          KEY_DIR="${HOME}/.appstoreconnect/private_keys"
          KEY_PATH="${KEY_DIR}/AuthKey_${APPSTORE_KEY_ID}.p8"

          mkdir -p "${KEY_DIR}"
          if [[ "${APPSTORE_PRIVATE_KEY}" == *"BEGIN PRIVATE KEY"* ]]; then
            printf '%s' "${APPSTORE_PRIVATE_KEY}" | perl -pe 's/\\n/\n/g; s/\r$//' > "${KEY_PATH}"
          else
            printf '%s' "${APPSTORE_PRIVATE_KEY}" | base64 --decode > "${KEY_PATH}"
          fi
          if ! grep -q "BEGIN PRIVATE KEY" "${KEY_PATH}"; then
            echo "::error::APPSTORE_PRIVATE_KEY must be the contents of the App Store Connect API key .p8 file, or its base64-encoded value"
            exit 1
          fi
          chmod 600 "${KEY_PATH}"

          if [ -d "${APP_PATH}/Contents/Frameworks" ]; then
            while IFS= read -r library; do
              codesign --force --timestamp --options runtime --sign "${MACOS_SIGN_IDENTITY}" "${library}"
            done < <(find "${APP_PATH}/Contents/Frameworks" -type f \( -name '*.dylib' -o -name '*.so' \))

            while IFS= read -r framework; do
              codesign --force --timestamp --options runtime --sign "${MACOS_SIGN_IDENTITY}" "${framework}"
            done < <(find "${APP_PATH}/Contents/Frameworks" -type d -name '*.framework' | sort -r)
          fi

          codesign --force --timestamp --options runtime \
            --entitlements macos/Runner/Release.entitlements \
            --sign "${MACOS_SIGN_IDENTITY}" \
            "${APP_PATH}"
          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"

          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "${NOTARY_ZIP}"
          xcrun notarytool submit "${NOTARY_ZIP}" \
            --key "${KEY_PATH}" \
            --key-id "${APPSTORE_KEY_ID}" \
            --issuer "${APPSTORE_ISSUER_ID}" \
            --wait
          xcrun stapler staple "${APP_PATH}"
          xcrun stapler validate "${APP_PATH}"

      - name: Package macOS zip
        id: package
        shell: bash
        run: |
          set -euo pipefail
          cd build/macos/Build/Products/Release
          PACKAGE_DIR="MimicX_macos-${{ needs.prepare.outputs.app_version }}"
          ZIP_NAME="${PACKAGE_DIR}.zip"
          mkdir "${PACKAGE_DIR}"
          mv "Mimic X.app" "${PACKAGE_DIR}/"
          ditto -c -k --sequesterRsrc --keepParent "${PACKAGE_DIR}" "${ZIP_NAME}"
          mkdir -p "${GITHUB_WORKSPACE}/dist"
          cp "${ZIP_NAME}" "${GITHUB_WORKSPACE}/dist/${ZIP_NAME}"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: mimicx-macos-${{ needs.prepare.outputs.app_version }}-${{ needs.prepare.outputs.build_number }}
          path: dist/*
          retention-days: 14

      - name: Upload macOS zip to GitHub Release
        if: needs.prepare.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --clobber

  windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [prepare, release]
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ needs.prepare.outputs.flutter_version }}
          channel: stable
          cache: true

      - name: Cache Windows native build
        uses: actions/cache@v5
        with:
          path: |
            build/windows
            windows/flutter/ephemeral
          key: windows-build-${{ hashFiles('pubspec.lock', 'windows/CMakeLists.txt', 'windows/runner/**', 'windows/flutter/CMakeLists.txt') }}
          restore-keys: |
            windows-build-

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: >
          flutter build windows --release
          --build-name=${{ needs.prepare.outputs.app_version }}
          --build-number=${{ needs.prepare.outputs.build_number }}

      - name: Package Windows zip
        id: package
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.app_version }}"
          $zipName = "MimicX_windows-$version.zip"
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath $zipName -Force
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: mimicx-windows-${{ needs.prepare.outputs.app_version }}-${{ needs.prepare.outputs.build_number }}
          path: ${{ steps.package.outputs.zip_name }}
          retention-days: 14

      - name: Upload Windows zip to GitHub Release
        if: needs.prepare.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: gh release upload "$env:GITHUB_REF_NAME" "${{ steps.package.outputs.zip_name }}" --clobber
