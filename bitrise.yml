---
format_version: '26'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: flutter
workflows:
  _build_android:
    steps:
    - script@1:
        inputs:
        - content: |
            #!/usr/bin/env bash
            set -euo pipefail

            APP_VERSION_LINE=$(grep '^version:' $BITRISE_FLUTTER_PROJECT_LOCATION/pubspec.yaml)
            # version: 1.2.3+45 → 1.2.3
            APP_VERSION=$(echo "$APP_VERSION_LINE" | sed -E 's/version:[[:space:]]*([^+]+).*/\1/')
            echo "APP_VERSION=$APP_VERSION"

            FLUTTER_VERSION_LINE=$(grep 'flutter' $BITRISE_FLUTTER_PROJECT_LOCATION/.fvmrc)
            FLUTTER_VERSION=$(echo "$FLUTTER_VERSION_LINE" | sed -E 's/.*"flutter": *"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')

            envman add --key APP_VERSION --value "$APP_VERSION"
            envman add --key FLUTTER_VERSION --value "$FLUTTER_VERSION"
    - flutter-installer@1:
        inputs:
        - version: " ${FLUTTER_VERSION}"
    - flutter-analyze@0:
        inputs:
        - project_location: "$BITRISE_FLUTTER_PROJECT_LOCATION"
    - flutter-build@0:
        inputs:
        - project_location: "$BITRISE_FLUTTER_PROJECT_LOCATION"
        - platform: android
        - additional_build_params: "--build-number=$BITRISE_BUILD_NUMBER"
        - android_output_type: appbundle
        - android_additional_params: "--release"
    - sign-apk@2:
        inputs:
        - android_app: "$BITRISE_AAB_PATH"
        - output_name: MimicX_android-$APP_VERSION
    - bitrise-step-export-universal-apk@0: {}
    - sign-apk@2:
        inputs:
        - android_app: "$BITRISE_APK_PATH"
    - deploy-to-bitrise-io@2:
        inputs:
        - deploy_path: "$BITRISE_AAB_PATH"
    - deploy-to-bitrise-io@2:
        inputs:
        - deploy_path: "$BITRISE_SIGNED_APK_PATH"
  _build_ios:
    steps:
    - script@1:
        inputs:
        - content: |
            #!/usr/bin/env bash
            set -euo pipefail

            APP_VERSION_LINE=$(grep '^version:' $BITRISE_FLUTTER_PROJECT_LOCATION/pubspec.yaml)
            # version: 1.2.3+45 → 1.2.3
            APP_VERSION=$(echo "$APP_VERSION_LINE" | sed -E 's/version:[[:space:]]*([^+]+).*/\1/')
            echo "APP_VERSION=$APP_VERSION"

            FLUTTER_VERSION_LINE=$(grep 'flutter' $BITRISE_FLUTTER_PROJECT_LOCATION/.fvmrc)
            FLUTTER_VERSION=$(echo "$FLUTTER_VERSION_LINE" | sed -E 's/.*"flutter": *"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')

            envman add --key APP_VERSION --value "$APP_VERSION"
            envman add --key FLUTTER_VERSION --value "$FLUTTER_VERSION"
    - certificate-and-profile-installer@1: {}
    - flutter-installer@1:
        inputs:
        - version: " ${FLUTTER_VERSION}"
    - flutter-analyze@0:
        inputs:
        - project_location: "$BITRISE_FLUTTER_PROJECT_LOCATION"
    - script@1:
        inputs:
        - content: |-
            #!/usr/bin/env bash
            cd $BITRISE_FLUTTER_PROJECT_LOCATION
            fvm flutter build ios --config-only
    - manage-ios-code-signing@2:
        inputs:
        - distribution_method: ad-hoc
        - project_path: "$BITRISE_FLUTTER_PROJECT_LOCATION/ios/Runner.xcworkspace"
    - flutter-build@0:
        inputs:
        - project_location: "$BITRISE_FLUTTER_PROJECT_LOCATION"
        - platform: ios
        - additional_build_params: "--build-number=$BITRISE_BUILD_NUMBER"
        - ios_output_type: archive
    - xcode-archive@6:
        inputs:
        - project_path: "$BITRISE_FLUTTER_PROJECT_LOCATION/ios/Runner.xcworkspace"
        - platform: iOS
        - distribution_method: ad-hoc
        - artifact_name: MimicX-$APP_VERSION
    - deploy-to-bitrise-io@2:
        inputs:
        - deploy_path: "$BITRISE_IPA_PATH"
    - deploy-to-bitrise-io@2:
        inputs:
        - deploy_path: "$BITRISE_XCARCHIVE_ZIP_PATH"
  _build_macos:
    steps:
    - script@1:
        inputs:
        - content: |
            #!/usr/bin/env bash
            set -euo pipefail

            APP_VERSION_LINE=$(grep '^version:' $BITRISE_FLUTTER_PROJECT_LOCATION/pubspec.yaml)
            # version: 1.2.3+45 → 1.2.3
            APP_VERSION=$(echo "$APP_VERSION_LINE" | sed -E 's/version:[[:space:]]*([^+]+).*/\1/')
            echo "APP_VERSION=$APP_VERSION"

            FLUTTER_VERSION_LINE=$(grep 'flutter' $BITRISE_FLUTTER_PROJECT_LOCATION/.fvmrc)
            FLUTTER_VERSION=$(echo "$FLUTTER_VERSION_LINE" | sed -E 's/.*"flutter": *"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')

            envman add --key APP_VERSION --value "$APP_VERSION"
            envman add --key FLUTTER_VERSION --value "$FLUTTER_VERSION"
    - certificate-and-profile-installer@1: {}
    - flutter-installer@1:
        inputs:
        - version: " ${FLUTTER_VERSION}"
    - flutter-analyze@0:
        inputs:
        - project_location: "$BITRISE_FLUTTER_PROJECT_LOCATION"
    - script@1:
        inputs:
        - content: |-
            #!/usr/bin/env bash
            cd $BITRISE_FLUTTER_PROJECT_LOCATION
            fvm flutter build macos --build-number=$BITRISE_BUILD_NUMBER
    - script@1:
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -euo pipefail

            cd $BITRISE_FLUTTER_PROJECT_LOCATION
            cd build/macos/Build/Products/Release
            mkdir MimicX_macos-$APP_VERSION
            mv "Mimic X.app" MimicX_macos-$APP_VERSION
            ditto -c -k --sequesterRsrc --keepParent MimicX_macos-$APP_VERSION MimicX_macos-$APP_VERSION.zip

            ls -la

            envman add --key APP_ZIP_PATH --value "$(pwd)/MimicX_macos-$APP_VERSION.zip"

            env
    - deploy-to-bitrise-io@2:
        inputs:
        - deploy_path: "$APP_ZIP_PATH"
  build_all:
    before_run:
    - _checkout
    meta:
      bitrise.io:
        machine_type_id: g2.mac.medium
    triggers:
      tag:
      - name:
          regex: v*.*.*
    after_run:
    - _build_ios
    - _build_android
    - _build_macos
    steps:
    - script@1:
        inputs:
        - content: |-
            #!/usr/bin/env bash
            # fail if any commands fails
            set -e
            # make pipelines' return status equal the last command to exit with a non-zero status, or zero if all commands exit successfully
            set -o pipefail
            # debug log
            set -x

            # write your script here
            bash ./scripts/check-tag-version.sh
  _checkout:
    steps:
    - git-clone@8:
        inputs:
        - update_submodules: 'no'
  build_ios:
    steps:
    - git-clone@8:
        inputs:
        - update_submodules: 'no'
    after_run:
    - _build_ios
  build_android:
    steps:
    - git-clone@8:
        inputs:
        - update_submodules: 'no'
    after_run:
    - _build_android
  build_macos:
    steps:
    - git-clone@8:
        inputs:
        - update_submodules: 'no'
    after_run:
    - _build_macos
meta:
  bitrise.io:
    stack: osx-xcode-26.4.x
app:
  envs:
  - BITRISE_FLUTTER_PROJECT_LOCATION: "."
    opts:
      is_expand: false
  - BITRISE_SCHEME: Runner
    opts:
      is_expand: false
